name: govflow

services:
  postgres:
    image: postgres:16
    container_name: govflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: govflow
      POSTGRES_USER: govflow
      POSTGRES_PASSWORD: govflow
    ports:
      - "5432:5432"
    volumes:
      - govflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govflow -d govflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional database UI. Browse to http://localhost:5050 (login: admin@govflow.local / admin).
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: govflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@govflow.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - govflow-pgadmin:/var/lib/pgadmin

volumes:
  govflow-pgdata:
  govflow-pgadmin:
